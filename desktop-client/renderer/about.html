<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - 服务器监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .about-container {
            text-align: center;
            max-width: 400px;
        }

        .app-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .app-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-version {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 24px;
        }

        .app-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.5);
        }

        .info-value {
            color: rgba(255, 255, 255, 0.8);
        }

        .links {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .link-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .copyright {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="about-container">
        <div class="app-icon">🖥️</div>
        <h1 class="app-name">服务器监控系统</h1>
        <div class="app-version" id="appVersion">版本 1.0.0</div>
        <p class="app-desc">
            轻量级服务器监控系统，支持实时监控 CPU、内存、磁盘、网络等系统资源，
            内置 SSH 终端和音乐播放功能。
        </p>
        
        <div class="divider"></div>
        
        <div class="info-list">
            <div class="info-item">
                <span class="info-label">桌面客户端</span>
                <span class="info-value">Electron</span>
            </div>
            <div class="info-item">
                <span class="info-label">后端服务</span>
                <span class="info-value">Node.js</span>
            </div>
            <div class="info-item">
                <span class="info-label">数据采集</span>
                <span class="info-value">systeminformation</span>
            </div>
        </div>

        <div class="links">
            <a href="#" class="link-btn" id="githubLink">GitHub</a>
        </div>

        <div class="copyright">
            © 2024 Server Monitor. All rights reserved.
        </div>
    </div>

    <script>
        // 获取版本号
        if (window.electronAPI) {
            window.electronAPI.getAppVersion().then(version => {
                document.getElementById('appVersion').textContent = `版本 ${version}`;
            });
        }

        // GitHub 链接
        document.getElementById('githubLink').addEventListener('click', (e) => {
            e.preventDefault();
            if (window.electronAPI) {
                window.electronAPI.openExternal('https://github.com/5418814520666/server-monitor');
            }
        });
    </script>
</body>
</html>
