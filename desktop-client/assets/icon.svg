<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="256" height="256" rx="48" fill="url(#bgGradient)"/>
  
  <!-- 显示器图标 -->
  <g transform="translate(64, 72)">
    <!-- 屏幕 -->
    <rect x="0" y="0" width="128" height="88" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    
    <!-- 屏幕内容 - 图表 -->
    <g transform="translate(16, 16)">
      <rect x="0" y="40" width="8" height="24" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
      <rect x="16" y="28" width="8" height="36" rx="2" fill="url(#accentGradient)" opacity="0.9"/>
      <rect x="32" y="20" width="8" height="44" rx="2" fill="url(#accentGradient)"/>
      <rect x="48" y="32" width="8" height="32" rx="2" fill="url(#accentGradient)" opacity="0.9"/>
      <rect x="64" y="12" width="8" height="52" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
      <rect x="80" y="24" width="8" height="40" rx="2" fill="url(#accentGradient)" opacity="0.7"/>
    </g>
    
    <!-- 底座 -->
    <rect x="48" y="96" width="32" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="32" y="104" width="64" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  </g>
  
  <!-- 装饰元素 -->
  <circle cx="48" cy="48" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="208" cy="208" r="6" fill="#7b2cbf" opacity="0.5"/>
  <circle cx="200" cy="56" r="3" fill="#00d4ff" opacity="0.4"/>
</svg>
