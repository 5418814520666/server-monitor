<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>
  
  <!-- 服务器图标主体 -->
  <g transform="translate(128, 100)">
    <!-- 服务器机架 -->
    <rect x="0" y="0" width="256" height="312" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    
    <!-- 服务器单元 1 -->
    <rect x="16" y="24" width="224" height="64" rx="8" fill="rgba(0,212,255,0.15)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
    <!-- 指示灯 -->
    <circle cx="40" cy="56" r="6" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="56" r="6" fill="#00d4ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- 硬盘条 -->
    <rect x="90" y="48" width="80" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="90" y="48" width="60" height="16" rx="4" fill="url(#accentGradient)"/>
    
    <!-- 服务器单元 2 -->
    <rect x="16" y="104" width="224" height="64" rx="8" fill="rgba(123,44,191,0.15)" stroke="rgba(123,44,191,0.3)" stroke-width="1.5"/>
    <!-- 指示灯 -->
    <circle cx="40" cy="136" r="6" fill="#ffcc00">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="136" r="6" fill="#00d4ff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <!-- 进度条 -->
    <rect x="90" y="128" width="80" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="90" y="128" width="45" height="16" rx="4" fill="url(#accentGradient)"/>
    
    <!-- 服务器单元 3 -->
    <rect x="16" y="184" width="224" height="64" rx="8" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)" stroke-width="1.5"/>
    <!-- 指示灯 -->
    <circle cx="40" cy="216" r="6" fill="#00ff88">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="216" r="6" fill="#ff6b6b">
      <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- 进度条 -->
    <rect x="90" y="208" width="80" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="90" y="208" width="70" height="16" rx="4" fill="url(#accentGradient)"/>
    
    <!-- 底部通风口 -->
    <rect x="16" y="268" width="224" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
    <g stroke="rgba(255,255,255,0.15)" stroke-width="2">
      <line x1="32" y1="275" x2="224" y2="275"/>
      <line x1="32" y1="282" x2="224" y2="282"/>
      <line x1="32" y1="289" x2="224" y2="289"/>
    </g>
  </g>
  
  <!-- 脉冲环 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="180;220;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 装饰性光点 -->
  <circle cx="80" cy="80" r="4" fill="#00d4ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="432" cy="120" r="3" fill="#7b2cbf" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="420" r="5" fill="#00d4ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="400" r="3" fill="#7b2cbf" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
