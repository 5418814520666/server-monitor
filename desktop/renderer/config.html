<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器配置 - 服务器监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        .config-container {
            max-width: 480px;
            width: 100%;
            padding: 40px 20px;
        }
        
        .config-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .config-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .config-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .config-header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .config-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }
        
        .save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }
        
        .save-btn:active {
            transform: translateY(0);
        }
        
        .version-info {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }
        
        .update-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            color: #00d4ff;
            font-size: 11px;
            margin-left: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .update-badge:hover {
            background: rgba(0, 212, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="config-container">
        <div class="config-card">
            <div class="config-header">
                <div class="config-icon">🖥️</div>
                <h1>服务器监控系统</h1>
                <p>桌面客户端配置</p>
            </div>
            
            <form id="configForm">
                <div class="form-group">
                    <label for="serverUrl">服务器地址</label>
                    <input type="text" id="serverUrl" placeholder="例如: http://192.168.1.100:3000" required>
                    <div class="form-hint">请输入服务器监控系统的访问地址</div>
                </div>
                
                <div class="form-group">
                    <label for="serverName">服务器名称（可选）</label>
                    <input type="text" id="serverName" placeholder="例如: 生产服务器">
                    <div class="form-hint">给这个服务器起个名字，方便识别</div>
                </div>
                
                <button type="submit" class="save-btn">
                    保存并连接
                </button>
            </form>
            
            <div class="version-info">
                <span id="versionText">版本 v1.0.0</span>
                <span class="update-badge" id="checkUpdateBtn">检查更新</span>
            </div>
        </div>
    </div>

    <script>
        // 检查是否为桌面端
        const isDesktop = window.electronAPI && window.electronAPI.isDesktop;
        
        // DOM 元素
        const configForm = document.getElementById('configForm');
        const serverUrlInput = document.getElementById('serverUrl');
        const serverNameInput = document.getElementById('serverName');
        const versionText = document.getElementById('versionText');
        const checkUpdateBtn = document.getElementById('checkUpdateBtn');
        
        // 加载已保存的配置
        function loadConfig() {
            const savedUrl = localStorage.getItem('server_url') || '';
            const savedName = localStorage.getItem('server_name') || '';
            
            if (savedUrl) {
                serverUrlInput.value = savedUrl;
            }
            if (savedName) {
                serverNameInput.value = savedName;
            }
        }
        
        // 保存配置
        function saveConfig(url, name) {
            localStorage.setItem('server_url', url);
            localStorage.setItem('server_name', name || '');
        }
        
        // 跳转到监控页面
        function goToMonitor() {
            const serverUrl = localStorage.getItem('server_url');
            if (isDesktop && window.electronAPI.loadServer && serverUrl) {
                window.electronAPI.loadServer(serverUrl);
            }
        }
        
        // 表单提交
        configForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            let serverUrl = serverUrlInput.value.trim();
            const serverName = serverNameInput.value.trim();
            
            // 验证 URL
            if (!serverUrl) {
                alert('请输入服务器地址');
                return;
            }
            
            // 自动添加 http:// 前缀
            if (!serverUrl.startsWith('http://') && !serverUrl.startsWith('https://')) {
                serverUrl = 'http://' + serverUrl;
            }
            
            // 移除末尾的斜杠
            serverUrl = serverUrl.replace(/\/+$/, '');
            
            // 保存配置
            saveConfig(serverUrl, serverName);
            
            // 跳转到监控页面
            goToMonitor();
        });
        
        // 检查更新
        checkUpdateBtn.addEventListener('click', () => {
            if (isDesktop && window.electronAPI.checkUpdates) {
                window.electronAPI.checkUpdates();
            }
        });
        
        // 监听更新状态
        if (isDesktop && window.electronAPI.onUpdateStatus) {
            window.electronAPI.onUpdateStatus((data) => {
                console.log('更新状态:', data);
                
                if (data.status === 'available') {
                    if (confirm(`发现新版本 v${data.data.version}\n是否现在下载更新？`)) {
                        window.electronAPI.downloadUpdate();
                    }
                } else if (data.status === 'not-available') {
                    alert('当前已是最新版本');
                } else if (data.status === 'error') {
                    alert('检查更新失败: ' + data.data.error);
                } else if (data.status === 'downloaded') {
                    if (confirm('更新下载完成，是否现在重启安装？')) {
                        window.electronAPI.installUpdate();
                    }
                }
            });
        }
        
        // 获取版本号
        if (isDesktop && window.electronAPI.getVersion) {
            window.electronAPI.getVersion().then((result) => {
                versionText.textContent = `版本 v${result.version}`;
            });
        }
        
        // 初始化
        loadConfig();
    </script>
</body>
</html>
