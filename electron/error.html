<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接失败 - 服务器监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .config-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .config-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        .tips {
            margin-top: 24px;
            padding: 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            text-align: left;
        }

        .tips h3 {
            font-size: 14px;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
        }

        .tips li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #00d4ff;
        }

        .version {
            margin-top: 32px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">🔌</div>
        <h1>无法连接到服务器</h1>
        <p class="description">
            无法连接到服务器监控系统，请检查服务器地址是否正确，或服务器是否正常运行。
        </p>

        <div class="config-section">
            <h2>服务器设置</h2>
            <div class="input-group">
                <label for="serverUrl">服务器地址</label>
                <input type="text" id="serverUrl" placeholder="例如: http://192.168.1.100:3000">
            </div>
            <button class="btn" id="connectBtn">连接</button>
            <button class="btn btn-secondary" id="retryBtn">重试</button>
        </div>

        <div class="tips">
            <h3>💡 常见问题</h3>
            <ul>
                <li>确保服务器已启动并正常运行</li>
                <li>检查服务器地址和端口是否正确</li>
                <li>确认防火墙已开放相应端口</li>
                <li>检查网络连接是否正常</li>
            </ul>
        </div>

        <div class="version" id="versionInfo"></div>
    </div>

    <script>
        // 获取 DOM 元素
        const serverUrlInput = document.getElementById('serverUrl');
        const connectBtn = document.getElementById('connectBtn');
        const retryBtn = document.getElementById('retryBtn');
        const versionInfo = document.getElementById('versionInfo');

        // 初始化
        async function init() {
            // 显示版本号
            if (window.electronAPI) {
                const version = await window.electronAPI.getAppVersion();
                versionInfo.textContent = `客户端版本 v${version}`;

                // 加载保存的配置
                const config = await window.electronAPI.getConfig();
                if (config.serverUrl) {
                    serverUrlInput.value = config.serverUrl;
                }
            }
        }

        // 连接按钮
        connectBtn.addEventListener('click', async () => {
            const serverUrl = serverUrlInput.value.trim();
            
            if (!serverUrl) {
                alert('请输入服务器地址');
                return;
            }

            // 保存配置
            if (window.electronAPI) {
                await window.electronAPI.saveConfig({ serverUrl });
                // 重新加载窗口
                await window.electronAPI.reloadWindow();
            } else {
                // 非 Electron 环境，直接跳转
                window.location.href = serverUrl;
            }
        });

        // 重试按钮
        retryBtn.addEventListener('click', () => {
            if (window.electronAPI) {
                window.electronAPI.reloadWindow();
            } else {
                window.location.reload();
            }
        });

        // 回车连接
        serverUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                connectBtn.click();
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
