<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户端设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .setting-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-label {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            display: block;
        }

        .setting-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
        }

        .checkbox-item .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .checkbox-item .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        /* 自定义开关 */
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        .version-info {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 20px;
        }

        .update-status {
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .update-status.info {
            display: block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }

        .update-status.success {
            display: block;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .update-status.error {
            display: block;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 16px 0;
        }

        .save-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>客户端设置</h1>

        <div class="setting-card">
            <div class="setting-item">
                <label class="setting-label">服务器地址</label>
                <input type="text" id="serverUrl" placeholder="http://localhost:3000">
                <div class="setting-desc">监控系统服务器的访问地址</div>
            </div>
        </div>

        <div class="setting-card">
            <div class="checkbox-item">
                <div>
                    <div class="label">关闭窗口最小化到托盘</div>
                    <div class="desc">关闭主窗口时不退出程序，最小化到系统托盘</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="closeToTray">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="divider"></div>

            <div class="checkbox-item">
                <div>
                    <div class="label">启动时最小化到托盘</div>
                    <div class="desc">程序启动时不显示主窗口，直接最小化到托盘</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="startMinimized">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="divider"></div>

            <div class="checkbox-item">
                <div>
                    <div class="label">自动检查更新</div>
                    <div class="desc">启动时自动检查是否有新版本</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="autoUpdate">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="setting-card">
            <div class="setting-item">
                <label class="setting-label">更新</label>
                <button class="btn btn-secondary" id="checkUpdateBtn">立即检查更新</button>
                <div id="updateStatus" class="update-status"></div>
            </div>
        </div>

        <button class="btn" id="saveBtn">保存设置</button>
        <div class="save-hint">部分设置需要重启客户端后生效</div>

        <div class="version-info">
            版本 v<span id="version">1.0.0</span>
        </div>
    </div>

    <script>
        // 检测是否在 Electron 环境中
        const isElectron = window.electronAPI && window.electronAPI.isElectron;

        // DOM 元素
        const serverUrlInput = document.getElementById('serverUrl');
        const closeToTrayInput = document.getElementById('closeToTray');
        const startMinimizedInput = document.getElementById('startMinimized');
        const autoUpdateInput = document.getElementById('autoUpdate');
        const saveBtn = document.getElementById('saveBtn');
        const checkUpdateBtn = document.getElementById('checkUpdateBtn');
        const updateStatus = document.getElementById('updateStatus');
        const versionSpan = document.getElementById('version');

        // 加载配置
        async function loadConfig() {
            if (isElectron) {
                try {
                    const config = await window.electronAPI.getConfig();
                    serverUrlInput.value = config.serverUrl || 'http://localhost:3000';
                    closeToTrayInput.checked = config.closeToTray !== false;
                    startMinimizedInput.checked = config.startMinimized === true;
                    autoUpdateInput.checked = config.autoUpdate !== false;

                    const version = await window.electronAPI.getVersion();
                    versionSpan.textContent = version;

                    // 监听更新状态
                    window.electronAPI.onUpdateStatus((text) => {
                        showUpdateStatus(text, 'info');
                    });
                } catch (e) {
                    console.error('加载配置失败:', e);
                }
            } else {
                // 浏览器环境，使用默认值
                versionSpan.textContent = '1.0.0';
            }
        }

        // 保存配置
        async function saveConfig() {
            if (isElectron) {
                try {
                    const config = {
                        serverUrl: serverUrlInput.value.trim() || 'http://localhost:3000',
                        closeToTray: closeToTrayInput.checked,
                        startMinimized: startMinimizedInput.checked,
                        autoUpdate: autoUpdateInput.checked
                    };

                    const result = await window.electronAPI.saveConfig(config);
                    if (result) {
                        showUpdateStatus('设置已保存，部分设置重启后生效', 'success');
                        setTimeout(() => {
                            updateStatus.style.display = 'none';
                        }, 3000);
                    }
                } catch (e) {
                    showUpdateStatus('保存失败: ' + e.message, 'error');
                }
            } else {
                showUpdateStatus('浏览器环境下无法保存设置', 'info');
            }
        }

        // 显示更新状态
        function showUpdateStatus(text, type = 'info') {
            updateStatus.textContent = text;
            updateStatus.className = 'update-status ' + type;
        }

        // 检查更新
        async function checkUpdates() {
            if (isElectron) {
                try {
                    showUpdateStatus('正在检查更新...', 'info');
                    await window.electronAPI.checkUpdates();
                } catch (e) {
                    showUpdateStatus('检查更新失败: ' + e.message, 'error');
                }
            } else {
                showUpdateStatus('浏览器环境下无法检查更新', 'info');
            }
        }

        // 事件监听
        saveBtn.addEventListener('click', saveConfig);
        checkUpdateBtn.addEventListener('click', checkUpdates);

        // 初始化
        loadConfig();
    </script>
</body>
</html>
