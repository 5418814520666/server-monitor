<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH 终端 - 服务器监控系统</title>
    <link rel="stylesheet" href="css/ssh.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="back-btn">
                    <span>←</span> 返回监控面板
                </a>
                <h1>🖥️ SSH 终端</h1>
            </div>
            <div class="header-right">
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot disconnected"></span>
                    <span class="status-text">未连接</span>
                </div>
            </div>
        </header>

        <!-- 连接表单 -->
        <div class="connect-panel" id="connectPanel">
            <div class="connect-card">
                <h2>🔌 SSH 连接配置</h2>
                <form id="sshForm">
                    <div class="form-group">
                        <label for="host">主机地址</label>
                        <input type="text" id="host" placeholder="例如: 192.168.1.100" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="port">端口</label>
                            <input type="number" id="port" value="22" min="1" max="65535" required>
                        </div>
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" placeholder="例如: root" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="输入密码">
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="usePrivateKey">
                            使用私钥认证
                        </label>
                    </div>
                    
                    <div class="form-group" id="privateKeyGroup" style="display: none;">
                        <label for="privateKey">私钥内容</label>
                        <textarea id="privateKey" rows="6" placeholder="粘贴你的私钥内容（-----BEGIN RSA PRIVATE KEY-----...）"></textarea>
                        <div class="form-group" style="margin-top: 10px;">
                            <label for="passphrase">私钥密码（可选）</label>
                            <input type="password" id="passphrase" placeholder="私钥密码（如果有）">
                        </div>
                    </div>
                    
                    <button type="submit" class="connect-btn">
                        <span>🚀 连接 SSH</span>
                    </button>
                </form>
                
                <div class="quick-connect">
                    <h3>⚡ 快速连接</h3>
                    <div class="quick-list" id="quickList">
                        <p class="no-history">暂无历史连接</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 终端区域 -->
        <div class="terminal-container" id="terminalContainer" style="display: none;">
            <div class="terminal-header">
                <div class="terminal-info">
                    <span id="terminalTitle">SSH Terminal</span>
                </div>
                <div class="terminal-actions">
                    <button class="action-btn" id="disconnectBtn" title="断开连接">
                        ⏹️ 断开
                    </button>
                    <button class="action-btn" id="reconnectBtn" title="重新连接">
                        🔄 重连
                    </button>
                    <button class="action-btn" id="copyBtn" title="复制选中内容">
                        📋 复制
                    </button>
                    <button class="action-btn" id="clearBtn" title="清屏">
                        🧹 清屏
                    </button>
                </div>
            </div>
            <div class="terminal-wrapper">
                <div id="terminal"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="js/ssh.js"></script>
</body>
</html>
