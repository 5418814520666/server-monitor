<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器监控系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🖥️ 服务器监控系统</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
                <span class="last-update" id="lastUpdate"></span>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card cpu">
                <div class="stat-icon">⚡</div>
                <div class="stat-content">
                    <h3>CPU 使用率</h3>
                    <div class="stat-value" id="cpuUsage">--%</div>
                    <div class="stat-detail" id="cpuModel">--</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill cpu-fill" id="cpuProgress"></div>
                </div>
            </div>

            <div class="stat-card memory">
                <div class="stat-icon">💾</div>
                <div class="stat-content">
                    <h3>内存使用</h3>
                    <div class="stat-value" id="memUsage">--%</div>
                    <div class="stat-detail" id="memDetail">-- / -- GB</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill memory-fill" id="memProgress"></div>
                </div>
            </div>

            <div class="stat-card disk">
                <div class="stat-icon">💿</div>
                <div class="stat-content">
                    <h3>磁盘使用</h3>
                    <div class="stat-value" id="diskUsage">--%</div>
                    <div class="stat-detail" id="diskDetail">-- / -- GB</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill disk-fill" id="diskProgress"></div>
                </div>
            </div>

            <div class="stat-card network">
                <div class="stat-icon">🌐</div>
                <div class="stat-content">
                    <h3>网络流量</h3>
                    <div class="stat-value" id="netSpeed">-- KB/s</div>
                    <div class="stat-detail">
                        <span class="rx">↓ <span id="netRx">--</span> KB/s</span>
                        <span class="tx">↑ <span id="netTx">--</span> KB/s</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>CPU 使用率趋势</h3>
                <canvas id="cpuChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>内存使用率趋势</h3>
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card wide">
                <h3>网络流量趋势</h3>
                <canvas id="networkChart"></canvas>
            </div>
        </div>

        <div class="info-section">
            <div class="info-card">
                <h3>💻 系统信息</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">主机名</span>
                        <span class="info-value" id="hostname">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">操作系统</span>
                        <span class="info-value" id="osInfo">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">内核版本</span>
                        <span class="info-value" id="kernel">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">系统架构</span>
                        <span class="info-value" id="arch">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">运行时间</span>
                        <span class="info-value" id="uptime">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">CPU 核心</span>
                        <span class="info-value" id="cpuCores">--</span>
                    </div>
                </div>
            </div>

            <div class="info-card">
                <h3>💿 磁盘详情</h3>
                <div id="diskList" class="disk-list">
                    <div class="disk-item">加载中...</div>
                </div>
            </div>
        </div>

        <div class="info-section">
            <div class="info-card wide">
                <h3>🌐 网络接口详情</h3>
                <div id="networkList" class="network-list">
                    <div class="network-item">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
