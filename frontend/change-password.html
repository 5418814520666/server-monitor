<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 服务器监控系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">🔐</div>
                <h1>修改密码</h1>
                <p id="pageSubtitle">请修改您的密码</p>
            </div>
            
            <div class="warning-message" id="forceChangeWarning" style="display: none;">
                ⚠️ 您正在使用默认密码，请立即修改以确保账户安全
            </div>
            
            <form id="changePasswordForm" class="login-form">
                <div class="form-group">
                    <label for="oldPassword">当前密码</label>
                    <input type="password" id="oldPassword" name="oldPassword" placeholder="请输入当前密码" required autocomplete="current-password">
                </div>
                
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="请输入新密码（至少6位）" required autocomplete="new-password">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入新密码" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="login-btn" id="submitBtn">
                    <span class="btn-text">确认修改</span>
                    <span class="btn-loading" style="display: none;">修改中...</span>
                </button>
                
                <div class="error-message" id="errorMessage" style="display: none;"></div>
                <div class="success-message" id="successMessage" style="display: none;"></div>
            </form>
            
            <div class="login-footer">
                <p><a href="index.html" id="backLink" style="color: rgba(255, 255, 255, 0.6); text-decoration: none;">← 返回监控面板</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/change-password.js"></script>
</body>
</html>
